
message TalentSkillItem {
    // 技能id
    required int32 id = 1;
    // 技能名字
    required string name = 2; 
    // 技能展示大图资源
    optional string model = 3;
    
    // 技能详情 故事背景描述
    optional string skillBgDesc = 4;
    // 技能详情 技能描述
    optional string skillDesc = 5;
    // 技能详情 技能描述介绍图
    optional string skillIntroImg = 6;
    
    // 技能关联的活动名字
    optional string linkActName = 7;
    // 技能关联的活动跳转链接
    optional string linkActUrl = 8;

    // 技能激活来源描述
    optional  string skillActiveSourceDesc = 9;
    // 技能获取渠道描述
    optional string skillGetWayDesc = 10;
}